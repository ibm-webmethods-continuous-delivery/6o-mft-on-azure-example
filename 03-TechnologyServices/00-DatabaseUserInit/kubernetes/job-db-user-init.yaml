apiVersion: batch/v1
kind: Job
metadata:
  name: database-user-init
  namespace: default
  labels:
    app: database-user-init
    component: initialization
  annotations:
    description: "Creates PostgreSQL application users for webMethods Active Transfer"
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 1800
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: database-user-init
        component: initialization
    spec:
      # Use service account with Azure Workload Identity for Key Vault access
      serviceAccountName: database-user-init-sa
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: postgres-client
        image: postgres:15
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: false
        command:
        - /bin/sh
        - /scripts/create-users.sh
        envFrom:
        - secretRef:
            name: db-user-init-credentials-synced
        volumeMounts:
        - name: init-script
          mountPath: /scripts
          readOnly: true
        # Mount secrets from Azure Key Vault via CSI driver
        - name: secrets-store
          mountPath: /mnt/secrets-store
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
      volumes:
      - name: init-script
        configMap:
          name: db-user-init-script
          defaultMode: 0755
          items:
          - key: create-users.sh
            path: create-users.sh
      # CSI driver volume for Azure Key Vault secrets
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: db-user-init-azure-kv-secrets
