apiVersion: v1
kind: ServiceAccount
metadata:
  name: database-user-init-sa
  namespace: default
  labels:
    app: database-user-init
    component: initialization
  annotations:
    # Azure Workload Identity annotation - enables OIDC token exchange
    # This allows the pod to authenticate to Azure using the managed identity
    azure.workload.identity/client-id: "bcce0918-93e6-4fe3-96dc-5d94359d9026"
    azure.workload.identity/tenant-id: "4a9b0190-274a-4f23-8f6e-036f7a667130"
