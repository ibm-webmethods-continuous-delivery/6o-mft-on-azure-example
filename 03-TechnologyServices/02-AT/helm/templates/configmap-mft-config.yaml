# ============================================================================
# MFT Configuration JSON ConfigMap Template
# ============================================================================
# This ConfigMap reads the mft-config.json file from the GitOps configuration
# directory at deployment time using the .Files.Get pattern.
#
# The mft-config.json file contains environment variable placeholders that
# will be substituted by the envsubst init container at pod startup.
#
# Environment variables are referenced using ${VAR_NAME} syntax in the JSON file.
# The envsubst init container will replace these with actual values from secrets.
# ============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "active-transfer.fullname" . }}-mft-config
  labels:
    {{- include "active-transfer.labels" . | nindent 4 }}
    app.kubernetes.io/component: configuration
data:
  mft-config.json: |
{{ .Files.Get (printf "gitops/config/%s/mft-config.json" .Values.envName) | indent 4 }}