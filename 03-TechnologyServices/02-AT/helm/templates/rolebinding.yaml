{{- if .Values.jgroups.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "active-transfer.fullname" . }}-jgroups
  labels:
    {{- include "active-transfer.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "active-transfer.fullname" . }}-jgroups
subjects:
  - kind: ServiceAccount
    name: {{ include "active-transfer.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
