{{- if eq .Values.secretProvider.type "azureKeyVault" }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "active-transfer.fullname" . }}-azure-kv
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "active-transfer.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.azureKeyVault.clientId | quote }}
    keyvaultName: {{ .Values.azureKeyVault.name | quote }}
    tenantId: {{ .Values.azureKeyVault.tenantId | quote }}
    objects: |
      array:
        # Admin password
        - |
          objectName: {{ .Values.envName }}-mft-admin-password
          objectType: secret
          objectAlias: mft-admin-password
        
        # Database passwords
        - |
          objectName: {{ .Values.envName }}-mft-db-postgres-online-password
          objectType: secret
          objectAlias: mft-db-postgres-online-password
        - |
          objectName: {{ .Values.envName }}-mft-db-postgres-archive-password
          objectType: secret
          objectAlias: mft-db-postgres-archive-password
        
        # Certificate passwords - JKS format
        - |
          objectName: {{ .Values.envName }}-mft-admin-ui-jks-keystore-password
          objectType: secret
          objectAlias: admin-ui-jks-keystore-password
        - |
          objectName: {{ .Values.envName }}-mft-admin-ui-jks-truststore-password
          objectType: secret
          objectAlias: admin-ui-jks-truststore-password
        - |
          objectName: {{ .Values.envName }}-mft-web-client-jks-keystore-password
          objectType: secret
          objectAlias: web-client-jks-keystore-password
        - |
          objectName: {{ .Values.envName }}-mft-web-client-jks-truststore-password
          objectType: secret
          objectAlias: web-client-jks-truststore-password
        
        # Certificate passwords - PKCS12 format
        - |
          objectName: {{ .Values.envName }}-mft-admin-ui-pkcs12-keystore-password
          objectType: secret
          objectAlias: admin-ui-pkcs12-keystore-password
        - |
          objectName: {{ .Values.envName }}-mft-admin-ui-pkcs12-truststore-password
          objectType: secret
          objectAlias: admin-ui-pkcs12-truststore-password
        - |
          objectName: {{ .Values.envName }}-mft-web-client-pkcs12-keystore-password
          objectType: secret
          objectAlias: web-client-pkcs12-keystore-password
        - |
          objectName: {{ .Values.envName }}-mft-web-client-pkcs12-truststore-password
          objectType: secret
          objectAlias: web-client-pkcs12-truststore-password
        
        # Global truststore passwords
        - |
          objectName: {{ .Values.envName }}-mft-cert-jks-truststore-password
          objectType: secret
          objectAlias: global-jks-truststore-password
        - |
          objectName: {{ .Values.envName }}-mft-cert-pkcs12-truststore-password
          objectType: secret
          objectAlias: global-pkcs12-truststore-password
        
        # SSH keys
        - |
          objectName: {{ .Values.envName }}-mft-sftp-ssh-private-key
          objectType: secret
          objectAlias: ssh-private-key
        {{- if .Values.metering.enabled }}
        
        # Metering configuration XML
        - |
          objectName: {{ .Values.envName }}-{{ .Values.metering.secretName }}
          objectType: secret
          objectAlias: meteringConfiguration.xml
        {{- end }}
        
        # Certificate files - JKS format (binary secrets, base64-encoded in Key Vault)
        - |
          objectName: {{ .Values.envName }}-mft-cert-admin-ui-keystore-jks
          objectType: secret
          objectAlias: admin-ui-keystore-jks
        - |
          objectName: {{ .Values.envName }}-mft-cert-truststore-jks
          objectType: secret
          objectAlias: global-truststore-jks
        - |
          objectName: {{ .Values.envName }}-mft-cert-web-client-keystore-jks
          objectType: secret
          objectAlias: web-client-keystore-jks
        
        # Certificate files - PKCS12 format (binary secrets, base64-encoded in Key Vault)
        - |
          objectName: {{ .Values.envName }}-mft-cert-admin-ui-keystore-pkcs12
          objectType: secret
          objectAlias: admin-ui-keystore-pkcs12
        - |
          objectName: {{ .Values.envName }}-mft-cert-truststore-pkcs12
          objectType: secret
          objectAlias: global-truststore-pkcs12
        - |
          objectName: {{ .Values.envName }}-mft-cert-web-client-keystore-pkcs12
          objectType: secret
          objectAlias: web-client-keystore-pkcs12
  
  {{- if .Values.azureKeyVault.syncToK8sSecrets }}
  # Sync to Kubernetes secrets for environment variables
  secretObjects:
    - secretName: mft-admin-credentials
      type: Opaque
      data:
        - objectName: mft-admin-password
          key: mft-admin-password
    
    - secretName: mft-db-credentials
      type: Opaque
      data:
        - objectName: mft-db-postgres-online-password
          key: mft-db-postgres-online-password
        - objectName: mft-db-postgres-archive-password
          key: mft-db-postgres-archive-password
    
    - secretName: mft-admin-ui-jks-certs
      type: Opaque
      data:
        - objectName: admin-ui-jks-keystore-password
          key: jks-keystore-password
        - objectName: admin-ui-jks-truststore-password
          key: jks-truststore-password
    
    - secretName: mft-admin-ui-pkcs12-certs
      type: Opaque
      data:
        - objectName: admin-ui-pkcs12-keystore-password
          key: pkcs12-keystore-password
        - objectName: admin-ui-pkcs12-truststore-password
          key: pkcs12-truststore-password
    
    - secretName: mft-web-client-jks-certs
      type: Opaque
      data:
        - objectName: web-client-jks-keystore-password
          key: jks-keystore-password
        - objectName: web-client-jks-truststore-password
          key: jks-truststore-password
    
    - secretName: mft-web-client-pkcs12-certs
      type: Opaque
      data:
        - objectName: web-client-pkcs12-keystore-password
          key: pkcs12-keystore-password
        - objectName: web-client-pkcs12-truststore-password
          key: pkcs12-truststore-password
    
    - secretName: mft-global-truststore-certs
      type: Opaque
      data:
        - objectName: global-jks-truststore-password
          key: jks-truststore-password
        - objectName: global-pkcs12-truststore-password
          key: pkcs12-truststore-password
    
    - secretName: mft-sftp-ssh-keys
      type: Opaque
      data:
        - objectName: ssh-private-key
          key: ssh-private-key
    
    # Certificate files - JKS format
    - secretName: mft-admin-ui-certs-jks
      type: Opaque
      data:
        - objectName: admin-ui-keystore-jks
          key: keystore.jks
        - objectName: global-truststore-jks
          key: truststore.jks
    
    - secretName: mft-web-client-certs-jks
      type: Opaque
      data:
        - objectName: web-client-keystore-jks
          key: keystore.jks
        - objectName: global-truststore-jks
          key: truststore.jks
    
    # Certificate files - PKCS12 format
    - secretName: mft-admin-ui-certs-pkcs12
      type: Opaque
      data:
        - objectName: admin-ui-keystore-pkcs12
          key: keystore.p12
        - objectName: global-truststore-pkcs12
          key: truststore.p12
    
    - secretName: mft-web-client-certs-pkcs12
      type: Opaque
      data:
        - objectName: web-client-keystore-pkcs12
          key: keystore.p12
        - objectName: global-truststore-pkcs12
          key: truststore.p12
  {{- end }}
{{- end }}
