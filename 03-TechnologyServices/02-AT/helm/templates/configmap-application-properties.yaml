apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "active-transfer.fullname" . }}-application-properties
  labels:
    {{- include "active-transfer.labels" . | nindent 4 }}
data:
  application.properties: |
    # ============================================================================
    # IBM webMethods Active Transfer - Application Properties
    # ============================================================================
    # This file configures database connections and Integration Server settings
    # for Active Transfer running in Azure AKS.
    #
    # Generated by Helm chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    # Release: {{ .Release.Name }}
    # Namespace: {{ .Release.Namespace }}
    # ============================================================================

    # ----------------------------------------------------------------------------
    # Development Settings (adjust for production)
    # ----------------------------------------------------------------------------
    settings.watt.server.ns.hideWmRoot=true
    settings.watt.debug.level=Info
    settings.watt.um.clientLog.level=Off
    settings.watt.server.ns.lockingMode=none
    settings.watt.server.saveConfigFiles=false
    settings.watt.server.audit.logFilesToKeep=3
    settings.watt.server.serverlogFilesToKeep=3
    settings.watt.server.stats.logFilesToKeep=3

    # ----------------------------------------------------------------------------
    # Connection Pool Aliases
    # ----------------------------------------------------------------------------
    # Map functional components to connection pools
    jdbcfunc.ISInternal.connPoolAlias=DBPool
    jdbcfunc.ISCoreAudit.connPoolAlias=DBPool
    jdbcfunc.ActiveTransfer.connPoolAlias=DBPool
    jdbcfunc.CentralUsers.connPoolAlias=DBPool
    jdbcfunc.ActiveTransferArchive.connPoolAlias=DBPoolArchive

    # ----------------------------------------------------------------------------
    # Primary Database Pool (DBPool) - Online Transactions
    # ----------------------------------------------------------------------------
    # Connection URL with SSL enabled
    jdbc.DBPool.dbURL={{ include "active-transfer.onlineDbUrl" . }}

    # Database credentials (from environment variables/secrets)
    jdbc.DBPool.userid={{ .Values.database.onlineDbUser }}
    jdbc.DBPool.password=$env{POSTGRES_PASSWORD}

    # Driver configuration
    jdbc.DBPool.driverAlias=DataDirect Connect JDBC PostgreSQL Driver

    # Connection pool settings
    jdbc.DBPool.minConns={{ .Values.database.connectionPool.minConns }}
    jdbc.DBPool.maxConns={{ .Values.database.connectionPool.maxConns }}

    # Connection validation
    jdbc.DBPool.testConnectionOnBorrow=true
    jdbc.DBPool.validationQuery=SELECT 1

    # ----------------------------------------------------------------------------
    # Archive Database Pool (DBPoolArchive) - Historical Data
    # ----------------------------------------------------------------------------
    # Connection URL with SSL enabled
    jdbc.DBPoolArchive.dbURL={{ include "active-transfer.archiveDbUrl" . }}

    # Database credentials (from environment variables/secrets)
    jdbc.DBPoolArchive.userid={{ .Values.database.archiveDbUser }}
    jdbc.DBPoolArchive.password=$env{POSTGRES_ARCHIVE_PASSWORD}

    # Driver configuration
    jdbc.DBPoolArchive.driverAlias=DataDirect Connect JDBC PostgreSQL Driver

    # Connection pool settings
    jdbc.DBPoolArchive.minConns={{ .Values.database.connectionPool.minConns }}
    jdbc.DBPoolArchive.maxConns={{ .Values.database.connectionPool.maxConns }}

    # Connection validation
    jdbc.DBPoolArchive.testConnectionOnBorrow=true
    jdbc.DBPoolArchive.validationQuery=SELECT 1

    # ----------------------------------------------------------------------------
    # ZzMftConfig Package - Startup Configuration
    # ----------------------------------------------------------------------------
    # Points to the mft-config.json file for declarative MFT configuration
    globalvariable.ZzMftConfigStartupTimeJsonFile.value=/mnt/injected/config/mft-config.json

    # ----------------------------------------------------------------------------
    # JGroups Cluster Synchronization
    # ----------------------------------------------------------------------------
    {{- if .Values.jgroups.enabled }}
    # Enable ActiveTransfer group synchronization for multi-node clustering
    mft.cluster.sync.enabled=true
    {{- end }}

    # ----------------------------------------------------------------------------
    # Additional Settings
    # ----------------------------------------------------------------------------
    # Timezone
    settings.watt.server.timezone=UTC

    # Session timeout (30 minutes)
    settings.watt.server.session.timeout=1800000

    # Maximum upload size (100MB)
    settings.watt.server.http.maxUploadSize=104857600

    # Administrator password - must be controlled from the environment
    user.Administrator.password=$env{MFT_ADMIN_PASSWORD}
