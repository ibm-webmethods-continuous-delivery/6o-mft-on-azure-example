{{- if .Values.persistence.privateStorage.enabled }}
# ============================================================================
# Kubernetes Secret for Private Storage Account Credentials
# ============================================================================
# This secret stores the Azure Storage Account credentials required for
# mounting the private Azure Files share via CSI driver.
#
# The credentials are provided via Helm values and should be sourced from:
# - Terraform outputs (for automated deployments)
# - Azure Key Vault (for production environments)
# - Secure CI/CD variables
#
# SECURITY NOTE: Never commit actual credentials to Git!
# ============================================================================
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.persistence.privateStorage.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "active-transfer.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
    storage-type: private
  annotations:
    description: "Credentials for private Azure Files storage account"
type: Opaque
stringData:
  azurestorageaccountname: {{ .Values.persistence.privateStorage.storageAccountName | quote }}
  azurestorageaccountkey: {{ .Values.persistence.privateStorage.storageAccountKey | quote }}
{{- end }}
