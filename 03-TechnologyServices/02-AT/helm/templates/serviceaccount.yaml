{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "active-transfer.serviceAccountName" . }}
  labels:
    {{- include "active-transfer.labels" . | nindent 4 }}
  annotations:
    {{- if eq .Values.secretProvider.type "azureKeyVault" }}
    # Workload identity annotation for Azure Key Vault access
    azure.workload.identity/client-id: {{ .Values.azureKeyVault.clientId | quote }}
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
