apiVersion: apps/v1
kind: {{ if .Values.statefulSet }}StatefulSet{{ else }}Deployment{{ end }}
metadata:
  name: {{ include "active-transfer.fullname" . }}
  labels:
    {{- include "active-transfer.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  {{- if .Values.statefulSet }}
  serviceName: {{ include "active-transfer.fullname" . }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "active-transfer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config-app-props: {{ include (print $.Template.BasePath "/configmap-application-properties.yaml") . | sha256sum }}
        checksum/config-mft-props: {{ include (print $.Template.BasePath "/configmap-mft-properties.yaml") . | sha256sum }}
        {{- if .Values.jgroups.enabled }}
        checksum/config-jgroups: {{ include (print $.Template.BasePath "/configmap-jgroups.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "active-transfer.selectorLabels" . | nindent 8 }}
        {{- if eq .Values.secretProvider.type "azureKeyVault" }}
        # Enable workload identity for Azure Key Vault access
        azure.workload.identity/use: "true"
        {{- end }}
        {{- with .Values.extraLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "active-transfer.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        # Environment variable substitution for mft-config.json
        # Replaces ${ENV_VAR} placeholders with actual values from secrets
        - name: envsubst-config
          image: alpine:3.19
          command:
            - /bin/sh
            - -c
            - |
              apk add --no-cache gettext
              envsubst < /mnt/config-template/mft-config.json > /mnt/config-processed/mft-config.json
              echo "Environment variable substitution completed"
              cat /mnt/config-processed/mft-config.json
          env:
            {{- if .Values.extraEnvs }}
            # Import all environment variables (includes secrets)
            {{- toYaml .Values.extraEnvs | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: mft-config-template
              mountPath: /mnt/config-template
              readOnly: true
            - name: mft-config-processed
              mountPath: /mnt/config-processed
              readOnly: false
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1724
        {{- if .Values.extraInitContainers }}
        {{- toYaml .Values.extraInitContainers | nindent 8 }}
        {{- end }}
      {{- if .Values.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- end }}
      {{- if .Values.dnsConfig }}
      dnsConfig:
        {{- toYaml .Values.dnsConfig | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "active-transfer.containerName" . }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            # Memory settings
            - name: JAVA_MIN_MEM
              value: {{ .Values.activeTransfer.memoryHeap.min }}
            - name: JAVA_MAX_MEM
              value: {{ .Values.activeTransfer.memoryHeap.max }}
            # Configuration files
            - name: SAG_IS_CONFIG_PROPERTIES
              value: "{{ .Values.activeTransfer.installDir }}/application.properties"
            {{- if .Values.activeTransfer.javaCustomOpts }}
            # Java custom options
            - name: JAVA_CUSTOM_OPTS
              value: "{{ join " " .Values.activeTransfer.javaCustomOpts }}"
            {{- end }}
            {{- if .Values.jgroups.enabled }}
            # JGroups cluster discovery
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KUBERNETES_LABELS
              value: "app.kubernetes.io/name={{ include "active-transfer.name" . }},app.kubernetes.io/instance={{ .Release.Name }}"
            {{- end }}
            {{- if .Values.extraEnvs }}
            # Extra environment variables (includes secrets)
            {{- toYaml .Values.extraEnvs | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.activeTransfer.httpPort }}
              protocol: TCP
            - name: https
              containerPort: {{ .Values.activeTransfer.httpsPort }}
              protocol: TCP
            - name: diag
              containerPort: {{ .Values.activeTransfer.diagnosticPort }}
              protocol: TCP
            {{- if .Values.jgroups.enabled }}
            - name: jgroups
              containerPort: {{ .Values.jgroups.tcpPort }}
              protocol: TCP
            {{- end }}
            {{- if .Values.extraPorts }}
            {{- toYaml .Values.extraPorts | nindent 12 }}
            {{- end }}
          {{- if .Values.startupProbe }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.resources.msrContainer }}
          resources:
            {{- toYaml .Values.resources.msrContainer | nindent 12 }}
          {{- end }}
          {{- if .Values.lifecycle }}
          lifecycle:
            {{- toYaml .Values.lifecycle | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if eq .Values.secretProvider.type "azureKeyVault" }}
            # Azure Key Vault secrets via CSI driver
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
            {{- end }}
            # Application properties
            - name: application-properties
              mountPath: {{ .Values.activeTransfer.installDir }}/application.properties
              subPath: application.properties
              readOnly: true
            # MFT properties.cnf
            - name: mft-properties
              mountPath: {{ .Values.activeTransfer.installDir }}/packages/WmMFT/config/properties.cnf
              subPath: properties.cnf
              readOnly: true
            # MFT configuration JSON template (from ConfigMap)
            - name: mft-config-template
              mountPath: /mnt/config-template/mft-config.json
              subPath: mft-config.json
              readOnly: true
            # MFT configuration JSON (processed by envsubst sidecar)
            - name: mft-config-processed
              mountPath: /mnt/injected/config
              readOnly: false
            {{- if .Values.jgroups.enabled }}
            # JGroups configuration
            - name: jgroups-config
              mountPath: {{ .Values.activeTransfer.installDir }}/packages/WmMFT/resources/jgroup-properties.xml
              subPath: jgroup-properties.xml
              readOnly: true
            {{- end }}
            {{- if .Values.extraVolumeMounts }}
            # Extra volume mounts (certificates, VFS)
            {{- toYaml .Values.extraVolumeMounts | nindent 12 }}
            {{- end }}
        {{- if .Values.extraContainers }}
        # Extra sidecar containers
        {{- toYaml .Values.extraContainers | nindent 8 }}
        {{- end }}
      volumes:
        {{- if eq .Values.secretProvider.type "azureKeyVault" }}
        # CSI driver volume for Azure Key Vault secrets
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: {{ include "active-transfer.fullname" . }}-azure-kv
        {{- end }}
        # Application properties ConfigMap
        - name: application-properties
          configMap:
            name: {{ include "active-transfer.fullname" . }}-application-properties
            items:
              - key: application.properties
                path: application.properties
        # MFT configuration template ConfigMap (with ${ENV_VAR} placeholders)
        - name: mft-config-template
          configMap:
            name: {{ include "active-transfer.fullname" . }}-mft-config
            items:
              - key: mft-config.json
                path: mft-config.json
        # MFT configuration processed (envsubst output, shared between init and main container)
        - name: mft-config-processed
          emptyDir: {}
        # MFT properties ConfigMap
        - name: mft-properties
          configMap:
            name: {{ include "active-transfer.fullname" . }}-mft-properties
            items:
              - key: properties.cnf
                path: properties.cnf
        {{- if .Values.jgroups.enabled }}
        # JGroups configuration ConfigMap
        - name: jgroups-config
          configMap:
            name: {{ include "active-transfer.fullname" . }}-jgroups
            items:
              - key: jgroup-properties.xml
                path: jgroup-properties.xml
        {{- end }}
        {{- if .Values.extraVolumes }}
        # Extra volumes (certificates, VFS)
        {{- toYaml .Values.extraVolumes | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
