apiVersion: v1
kind: ServiceAccount
metadata:
  name: database-configurator-sa
  namespace: default
  annotations:
    # Azure Workload Identity annotation - will be populated by deploy.sh
    # from Terraform output: mft_managed_identity_client_id
    azure.workload.identity/client-id: "bcce0918-93e6-4fe3-96dc-5d94359d9026"
  labels:
    azure.workload.identity/use: "true"
    app: database-configurator
    component: initialization
---
# USAGE INSTRUCTIONS:
# ===================
#
# This is a TEMPLATE file. The actual serviceaccount-dbc.yaml will be generated
# automatically by the deploy.sh script using Terraform outputs.
#
# The bcce0918-93e6-4fe3-96dc-5d94359d9026 placeholder will be replaced with the actual
# client ID from Terraform output: terraform output -raw mft_managed_identity_client_id
#
# This service account enables Azure Workload Identity for the database configurator job,
# allowing it to authenticate to Azure Key Vault without storing credentials in Kubernetes.
#
# WORKLOAD IDENTITY FLOW:
# 1. Job pod uses this service account
# 2. Azure AD issues token based on OIDC federation
# 3. Token is used to authenticate to Key Vault
# 4. CSI driver mounts secrets from Key Vault
#
# PREREQUISITES:
# - AKS cluster must have OIDC issuer enabled
# - Managed identity must have federated credential configured
# - Managed identity must have Key Vault role assignments
#
# All prerequisites are configured in Terraform:
# - azurerm_kubernetes_cluster.main.oidc_issuer_url
# - azurerm_user_assigned_identity.mft
# - azurerm_federated_identity_credential.mft
# - azurerm_role_assignment.mft_kv_secrets_user
#
# DEPLOYMENT:
# This file is automatically processed by deploy.sh
# Do not apply manually - use: ./deploy.sh
